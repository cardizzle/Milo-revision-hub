<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revision Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#0E9F6E;--green-d:#057A55;--green-l:#DEF7EC;
  --bg:#F4F7F5;--card:#FFFFFF;--sidebar:#0F2A24;--sidebar-hi:#15392F;
  --text:#102A23;--muted:#5B7068;--faint:#8A9B93;--border:#E4EAE7;
  --c0:#CBD5D1;--c1:#EF4444;--c2:#F97316;--c3:#EAB308;--c4:#84CC16;--c5:#16A34A;
  --c0bg:#F1F5F4;--c1bg:#FEECEC;--c2bg:#FFF1E6;--c3bg:#FEF9E7;--c4bg:#F2FAE4;--c5bg:#E7F6EC;
  --pol:#E11D48;--eco:#0E9F6E;--the:#7C3AED;--spa:#EA580C;
  --shadow:0 1px 3px rgba(16,42,35,0.05),0 1px 2px rgba(16,42,35,0.04);
  --shadow-lg:0 4px 16px rgba(16,42,35,0.08);
}
html,body{height:100%;font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
textarea,input{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#CDD8D3;border-radius:99px;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:#B3C2BB;background-clip:content-box}

#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{width:236px;flex-shrink:0;background:var(--sidebar);display:flex;flex-direction:column;color:#fff}
.sb-top{padding:22px 20px 18px}
.sb-brand{display:flex;align-items:center;gap:10px}
.sb-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#0E9F6E,#34D399);display:flex;align-items:center;justify-content:center;font-size:19px;color:#fff}
.sb-name{font-size:16px;font-weight:800;letter-spacing:-0.3px}
.sb-tag{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px}
.sb-streak{margin:14px 20px 6px;background:rgba(255,255,255,0.06);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:11px}
.sb-flame{font-size:24px;color:#FBBF24}
.sb-streak-n{font-size:20px;font-weight:800;line-height:1}
.sb-streak-l{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px}
.sb-nav{padding:12px 12px;flex:1;overflow-y:auto}
.sb-sec{font-size:9px;letter-spacing:1.6px;text-transform:uppercase;color:rgba(255,255,255,0.28);padding:14px 10px 6px}
.nav-btn{display:flex;align-items:center;gap:11px;padding:10px 12px;border:none;background:none;font-size:13.5px;color:rgba(255,255,255,0.6);text-align:left;width:100%;border-radius:9px;transition:all 0.14s;font-weight:500;position:relative}
.nav-btn:hover{background:rgba(255,255,255,0.06);color:#fff}
.nav-btn.active{background:rgba(255,255,255,0.1);color:#fff}
.nav-btn.active::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:#34D399;border-radius:0 3px 3px 0}
.nav-btn i{font-size:18px;opacity:0.85;width:18px;text-align:center}
.nav-btn .dot{width:9px;height:9px;border-radius:50%;margin-left:4px}
.nav-prog{margin-left:auto;font-size:10px;color:rgba(255,255,255,0.4);font-weight:600}
.sb-foot{padding:12px 16px;font-size:11px;color:rgba(255,255,255,0.35);display:flex;gap:6px;align-items:center;justify-content:center;cursor:pointer}
.sb-foot:hover{color:rgba(255,255,255,0.6)}
.sb-sync{padding:10px 16px 4px;font-size:11px;display:flex;gap:6px;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);border-top:1px solid rgba(255,255,255,0.07)}
.sb-sync i{font-size:14px}

/* MAIN */
#main{flex:1;overflow-y:auto}
.topbar{position:sticky;top:0;z-index:10;background:rgba(244,247,245,0.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:16px 34px;display:flex;align-items:center;justify-content:space-between}
.tb-title{font-size:19px;font-weight:800;letter-spacing:-0.4px}
.tb-sub{font-size:12.5px;color:var(--muted);margin-top:1px}
.content{padding:26px 34px 50px;max-width:1080px}
.page{display:none}.page.active{display:block;animation:fade 0.25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.grid{display:grid;gap:14px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:1fr 1fr}
@media(max-width:880px){.g4{grid-template-columns:1fr 1fr}.g2,.g3{grid-template-columns:1fr}}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow)}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
.card-t{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.card-t i{color:var(--green);font-size:17px}

.stat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:14px;min-height:120px;justify-content:flex-start}
.stat .ic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px}
.stat .v{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1}
.stat .l{font-size:12px;color:var(--muted);font-weight:600;margin-top:6px}
.stat .grp{margin-top:auto}

.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;color:white}

.bar{height:8px;background:var(--border);border-radius:99px;overflow:hidden}
.bar>div{height:100%;border-radius:99px;transition:width 0.5s cubic-bezier(.4,0,.2,1)}

/* STREAK HERO */
.streak-hero{background:linear-gradient(135deg,#0F2A24,#15463A);border-radius:18px;padding:22px 24px;color:#fff;display:flex;align-items:center;gap:22px;position:relative;overflow:hidden}
.streak-hero::after{content:"\ea70";font-family:'tabler-icons';position:absolute;right:-10px;bottom:-26px;font-size:150px;color:rgba(255,255,255,0.04)}
.sh-flame{font-size:52px;color:#FBBF24;line-height:1}
.sh-n{font-size:42px;font-weight:800;line-height:1;letter-spacing:-2px}
.sh-l{font-size:13px;color:rgba(255,255,255,0.65);margin-top:3px}
.sh-msg{font-size:13px;color:#86EFAC;font-weight:600;margin-top:8px}
.sh-week{display:flex;gap:9px;margin-left:auto;z-index:1}
.sh-day{text-align:center}
.sh-day .d{font-size:10px;color:rgba(255,255,255,0.5);margin-bottom:6px;font-weight:600}
.sh-day .c{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:14px;color:rgba(255,255,255,0.3)}
.sh-day .c.on{background:#FBBF24;color:#0F2A24}
.sh-day .c.today{box-shadow:0 0 0 2px #34D399}

/* TIMETABLE */
.tt-tabs{display:inline-flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:4px;margin-bottom:18px;box-shadow:var(--shadow)}
.tt-tab{padding:8px 16px;border:none;background:none;font-size:12.5px;font-weight:600;color:var(--muted);border-radius:8px;transition:all 0.14s}
.tt-tab.active{background:var(--green);color:#fff}
.day{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.day-h{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:#FBFCFB}
.day-d{font-size:14px;font-weight:800}
.day-note{font-size:11px;color:var(--muted);font-weight:500;margin-left:7px}
.ses{display:flex;align-items:center;gap:11px;padding:11px 18px;border-bottom:1px solid var(--border);transition:background 0.1s}
.ses:last-child{border-bottom:none}
.ses:hover{background:#FBFCFB}
.ses.done{opacity:0.5}
.ses.done .ses-task{text-decoration:line-through}
.chk{width:21px;height:21px;border-radius:6px;border:2px solid var(--border);background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.14s;color:#fff;font-size:12px}
.chk.on{border-color:transparent}
.ses-time{font-size:11px;color:var(--muted);font-weight:600;width:100px;flex-shrink:0}
.ses-task{font-size:13px;flex:1}
.icbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all 0.14s;flex-shrink:0}
.icbtn:hover{border-color:var(--green);color:var(--green);background:var(--green-l)}
.icbtn.has{background:var(--green-l);border-color:var(--green);color:var(--green-d)}
.exam-pill{font-size:10px;font-weight:800;padding:2px 9px;border-radius:7px;color:#fff;margin-left:7px;text-transform:uppercase;letter-spacing:0.4px}

/* SUBJECT */
.subj-hero{border-radius:16px;padding:22px 26px;color:#fff;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;position:relative;overflow:hidden}
.subj-hero .nm{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.subj-hero .bd{font-size:12.5px;color:rgba(255,255,255,0.75);margin-top:3px}
.subj-hero .ex{font-size:11.5px;color:rgba(255,255,255,0.6);margin-top:7px;display:flex;align-items:center;gap:6px}
.subj-hero .ring{text-align:center}
.subj-hero .ring .rn{font-size:26px;font-weight:800;line-height:1}
.subj-hero .ring .rl{font-size:10px;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:0.6px;margin-top:3px}
.subj-hero i.bgic{position:absolute;font-size:120px;right:120px;bottom:-30px;color:rgba(255,255,255,0.07)}
.stabs{display:flex;gap:3px;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:4px;margin-bottom:18px;box-shadow:var(--shadow);width:fit-content;flex-wrap:wrap}
.stab{padding:8px 15px;border:none;background:none;font-size:12.5px;font-weight:600;color:var(--muted);border-radius:8px;transition:all 0.14s;display:flex;align-items:center;gap:6px}
.stab.active{background:var(--green);color:#fff}
.stab i{font-size:15px}

/* CHECKLIST */
.unit{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.unit-h{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.unit-h:hover{background:#FBFCFB}
.unit-chev{transition:transform 0.2s;color:var(--faint);font-size:18px}
.unit.open .unit-chev{transform:rotate(90deg)}
.unit-nm{font-size:14px;font-weight:700;flex:1}
.unit-prog{display:flex;align-items:center;gap:10px}
.unit-ragbar{display:flex;height:7px;width:90px;border-radius:99px;overflow:hidden;background:var(--border)}
.unit-ragbar>span{height:100%}
.unit-count{font-size:11px;color:var(--muted);font-weight:600;min-width:34px;text-align:right}
.unit-body{display:none;border-top:1px solid var(--border)}
.unit.open .unit-body{display:block}
.topic{border-bottom:1px solid var(--border)}
.topic:last-child{border-bottom:none}
.topic-row{display:flex;align-items:center;gap:12px;padding:11px 18px;transition:background 0.1s}
.topic-row:hover{background:#FBFCFB}
.rag{width:26px;height:26px;border-radius:8px;border:none;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;transition:transform 0.1s}
.rag:active{transform:scale(0.9)}
.topic-nm{font-size:13px;flex:1}
.topic-tools{display:flex;gap:6px;align-items:center}
.mini-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px}
.topic-detail{display:none;padding:0 18px 16px 56px;background:#FBFCFB}
.topic.exp .topic-detail{display:block}
.add-row{padding:11px 18px;display:flex;gap:8px}
.add-inp{flex:1;border:1.5px solid var(--border);border-radius:9px;padding:8px 11px;font-size:13px;background:#fff}
.add-inp:focus{outline:none;border-color:var(--green)}

/* RICH EDITOR */
.rte-tb{display:flex;gap:3px;border:1.5px solid var(--border);border-bottom:none;border-radius:9px 9px 0 0;padding:5px;background:#FBFCFB}
.rte-b{width:30px;height:28px;border:none;background:none;border-radius:6px;color:var(--muted);font-size:15px;display:flex;align-items:center;justify-content:center}
.rte-b:hover{background:var(--border);color:var(--text)}
.rte{border:1.5px solid var(--border);border-radius:0 0 9px 9px;padding:12px 14px;min-height:60px;font-size:13.5px;line-height:1.6;background:#fff;outline:none}
.rte:focus{border-color:var(--green)}
.rte:empty:before{content:attr(data-ph);color:var(--faint)}
.rte h3{font-size:15px;margin:8px 0 4px}
.rte ul,.rte ol{margin:4px 0 4px 20px}
.rte-sm{min-height:44px}

/* FILES */
.file-drop{border:2px dashed var(--border);border-radius:11px;padding:16px;text-align:center;font-size:12.5px;color:var(--muted);transition:all 0.14s;display:block}
.file-drop:hover{border-color:var(--green);color:var(--green);background:var(--green-l)}
.file-chip{display:flex;align-items:center;gap:9px;padding:9px 12px;background:#fff;border:1px solid var(--border);border-radius:10px;font-size:12.5px;margin-top:7px}
.file-chip i.fi{color:#DC2626;font-size:18px}
.file-chip .fn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-chip button{border:none;background:none;color:var(--muted);font-size:16px;width:26px;height:26px;border-radius:6px}
.file-chip button:hover{background:var(--border);color:var(--text)}

/* PAST PAPERS */
.pp{padding:14px 0;border-bottom:1px solid var(--border)}
.pp:last-child{border-bottom:none}
.pp-nm{font-size:13.5px;font-weight:600}
.pp-meta{font-size:11.5px;color:var(--muted);margin-top:2px}
.pp-note{font-size:12.5px;color:var(--muted);margin-top:6px;font-style:italic}
.score{font-size:13px;font-weight:800;padding:5px 13px;border-radius:9px}

/* GOALS */
.goal{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.goal:last-child{border-bottom:none}
.goal-txt{flex:1;font-size:13.5px}
.goal-txt.done{text-decoration:line-through;color:var(--muted)}
.goal-due{font-size:11px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:4px}
.goal-due.over{color:#DC2626}

/* WEAK TOPICS */
.weak{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.weak:last-child{border-bottom:none}
.weak .rag{width:22px;height:22px;font-size:10px}

/* BUTTONS */
.btn{padding:9px 17px;border-radius:10px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:#fff;color:var(--text);transition:all 0.14s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg);border-color:var(--faint)}
.btn.pri{background:var(--green);color:#fff;border-color:transparent}
.btn.pri:hover{background:var(--green-d)}
.btn.sm{padding:6px 11px;font-size:12px}
.btn.danger{color:#DC2626;border-color:#FECACA}
.btn.danger:hover{background:#FEF2F2}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(15,42,36,0.45);backdrop-filter:blur(3px);z-index:999;align-items:center;justify-content:center;padding:20px}
.ov.open{display:flex}
.modal{background:#fff;border-radius:18px;padding:26px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal h3{font-size:17px;font-weight:800;margin-bottom:4px}
.modal .msub{font-size:12.5px;color:var(--muted);margin-bottom:16px}
.fl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.7px;margin:14px 0 6px;display:block}
.modal input,.modal textarea,.modal select{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13.5px;background:var(--bg)}
.modal textarea{resize:vertical;min-height:90px}
.modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:var(--green);background:#fff}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

.empty{text-align:center;padding:30px 0;color:var(--muted);font-size:13px}
.empty i{font-size:32px;color:var(--border);display:block;margin-bottom:8px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-bottom:14px;align-items:center}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend .sw{width:14px;height:14px;border-radius:5px}
#gate{position:fixed;inset:0;z-index:9999;background:radial-gradient(120% 120% at 50% 0%,#15463A 0%,#0F2A24 60%,#0A1F1A 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff}
.gate-card{width:330px;text-align:center;padding:38px 32px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:22px;backdrop-filter:blur(10px);box-shadow:0 20px 50px rgba(0,0,0,0.3)}
.gate-logo{width:56px;height:56px;border-radius:16px;margin:0 auto 18px;background:linear-gradient(135deg,#0E9F6E,#34D399);display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff}
.gate-card h2{font-size:19px;font-weight:800}
.gate-card p{font-size:12.5px;color:rgba(255,255,255,0.5);margin-top:5px}
.gate-card input{width:100%;margin-top:20px;padding:13px 15px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.07);color:#fff;font-size:15px;text-align:center;font-family:inherit}
.gate-card input::placeholder{color:rgba(255,255,255,0.4)}
.gate-card input:focus{outline:none;border-color:#34D399;background:rgba(255,255,255,0.1)}
.gate-card button{width:100%;margin-top:12px;padding:13px;border-radius:12px;border:none;background:#10B981;color:#fff;font-weight:700;font-size:14px;font-family:inherit;transition:background 0.14s}
.gate-card button:hover{background:#059669}
.gate-err{color:#FCA5A5;font-size:12.5px;margin-top:12px;height:15px;font-weight:600}
</style>
</head>
<body>
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo"><i class="ti ti-lock"></i></div>
    <h2>Revision Hub</h2>
    <p>Enter your password to continue</p>
    <input id="gate-pw" type="password" placeholder="Password" autocomplete="off" onkeydown="if(event.key==='Enter')tryUnlock()">
    <button onclick="tryUnlock()">Unlock</button>
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>
<div id="app">
<aside id="sidebar">
  <div class="sb-top">
    <div class="sb-brand">
      <div class="sb-logo"><i class="ti ti-square-rounded-letter-r"></i></div>
      <div><div class="sb-name">Revision Hub</div><div class="sb-tag">A Level · June 2026</div></div>
    </div>
  </div>
  <div class="sb-streak">
    <i class="ti ti-flame sb-flame"></i>
    <div><div class="sb-streak-n" id="sb-streak">0</div><div class="sb-streak-l">day streak</div></div>
  </div>
  <nav class="sb-nav">
    <div class="sb-sec">Overview</div>
    <button class="nav-btn active" id="nav-dashboard" onclick="go('dashboard')"><i class="ti ti-home"></i>Dashboard</button>
    <button class="nav-btn" id="nav-timetable" onclick="go('timetable')"><i class="ti ti-calendar-week"></i>Timetable</button>
    <div class="sb-sec">Subjects</div>
    <button class="nav-btn" id="nav-politics" onclick="go('politics')"><span class="dot" style="background:var(--pol)"></span>Politics<span class="nav-prog" id="np-politics"></span></button>
    <button class="nav-btn" id="nav-economics" onclick="go('economics')"><span class="dot" style="background:var(--eco)"></span>Economics<span class="nav-prog" id="np-economics"></span></button>
    <button class="nav-btn" id="nav-theology" onclick="go('theology')"><span class="dot" style="background:var(--the)"></span>Theology<span class="nav-prog" id="np-theology"></span></button>

function idbPut(f){return new Promise(res=>{const tx=db.transaction('files','readwrite');tx.objectStore('files').put(f);tx.oncomplete=()=>res();});}
function idbGet(id){return new Promise(res=>{const tx=db.transaction('files','readonly');const r=tx.objectStore('files').get(id);r.onsuccess=()=>res(r.result);});}
function idbDel(id){return new Promise(res=>{const tx=db.transaction('files','readwrite');tx.objectStore('files').delete(id);tx.oncomplete=()=>res();});}

const sk=(d,t,s)=>d+'|'+t+'|'+s;
const allSes=()=>WEEKS.flatMap(w=>w.days.flatMap(d=>d.sessions.filter(x=>x.s!=='break'&&!x.exam).map(x=>({date:d.date,...x,key:sk(d.date,x.t,x.s)}))));
const todayStr=()=>new Date().toISOString().slice(0,10);
function ragCounts(k){const c=[0,0,0,0,0,0];(state.checklist[k]||[]).forEach(u=>u.topics.forEach(t=>c[t.rag]++));return c;}
function subjMastery(k){const c=ragCounts(k);const tot=c.reduce((a,b)=>a+b,0);if(!tot)return 0;const score=c.reduce((a,n,i)=>a+n*i,0);return Math.round(score/(tot*5)*100);}

/* ---------- STREAK ---------- */
function bumpStreak(){const t=todayStr();state.streak.history[t]=true;recalcStreak();save();}
function recalcStreak(){
  let cur=0;const d=new Date();
  if(!state.streak.history[todayStr()]){d.setDate(d.getDate()-1);}
  while(state.streak.history[d.toISOString().slice(0,10)]){cur++;d.setDate(d.getDate()-1);}
  state.streak.current=cur;
  if(cur>(state.streak.longest||0))state.streak.longest=cur;
}
recalcStreak();
function streakMsg(n){if(n===0)return"Tick anything today to start your streak!";if(n<3)return"Nice start — keep it rolling!";if(n<7)return"You're on fire. Don't break the chain!";if(n<14)return"Unstoppable. This is how A*s are made.";return"Legendary discipline. Examiners won't know what hit them.";}

/* ---------- NAV ---------- */
function go(id){
  curPage=id;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  document.getElementById('main').scrollTop=0;
  if(id==='dashboard')renderDash();
  else if(id==='timetable')renderTT();
  else renderSubject(id);
  const titles={dashboard:['Dashboard','Your A* campaign'],timetable:['Timetable','Tick sessions as you complete them']};
  if(titles[id]){document.getElementById('tb-title').textContent=titles[id][0];document.getElementById('tb-sub').textContent=titles[id][1];document.getElementById('tb-action').innerHTML='';}
  else{document.getElementById('tb-title').textContent=SUBJ[id].n;document.getElementById('tb-sub').textContent=SUBJ[id].board;document.getElementById('tb-action').innerHTML='';}
  updateNav();
}
function updateNav(){for(const k in SUBJ){const el=document.getElementById('np-'+k);if(el)el.textContent=subjMastery(k)+'%';}document.getElementById('sb-streak').textContent=state.streak.current;}

/* ---------- DASHBOARD ---------- */
function renderDash(){
  const all=allSes(),done=all.filter(x=>state.completed[x.key]).length,pct=Math.round(done/all.length*100);
  const exam=new Date('2026-06-18'),diff=Math.ceil((exam-new Date())/864e5);
  const weak=[];for(const k in SUBJ)(state.checklist[k]||[]).forEach(u=>u.topics.forEach(t=>{if(t.rag>=1&&t.rag<=2)weak.push({k,u:u.u,n:t.n,rag:t.rag});}));
  weak.sort((a,b)=>a.rag-b.rag);
  const goalsAll=[];for(const k in SUBJ)state.goals[k].forEach(g=>goalsAll.push({...g,k}));
  const active=goalsAll.filter(g=>!g.done);
  const wk=[];const base=new Date();for(let i=6;i>=0;i--){const d=new Date(base);d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);wk.push({lbl:['S','M','T','W','T','F','S'][d.getDay()],on:!!state.streak.history[ds],today:ds===todayStr()});}
  document.getElementById('page-dashboard').innerHTML=`
  <div class="streak-hero" style="margin-bottom:18px">
    <i class="ti ti-flame sh-flame"></i>
    <div><div class="sh-n">${state.streak.current} day${state.streak.current===1?'':'s'}</div><div class="sh-l">Current streak · longest ${state.streak.longest}</div><div class="sh-msg">${streakMsg(state.streak.current)}</div></div>
    <div class="sh-week">${wk.map(d=>`<div class="sh-day"><div class="d">${d.lbl}</div><div class="c ${d.on?'on':''} ${d.today?'today':''}">${d.on?'<i class="ti ti-check"></i>':''}</div></div>`).join('')}</div>
  </div>
  <div class="grid g4" style="margin-bottom:14px">
    <div class="stat"><div class="ic" style="background:var(--green-l);color:var(--green-d)"><i class="ti ti-checkbox"></i></div><div class="grp"><div class="v">${done}<span style="font-size:15px;color:var(--faint);font-weight:700">/${all.length}</span></div><div class="l">Sessions done</div></div></div>
    <div class="stat"><div class="ic" style="background:#EEF2FF;color:#4F46E5"><i class="ti ti-target-arrow"></i></div><div class="grp"><div class="v">${pct}%</div><div class="l">Plan progress</div></div></div>
    <div class="stat"><div class="ic" style="background:#FEF3C7;color:#B45309"><i class="ti ti-calendar-due"></i></div><div class="grp"><div class="v">${diff>0?diff:'0'}</div><div class="l">Days to first exam</div></div></div>
    <div class="stat"><div class="ic" style="background:#FCE7F3;color:#BE185D"><i class="ti ti-flag"></i></div><div class="grp"><div class="v">${active.length}</div><div class="l">Active goals</div></div></div>
  </div>
  <div class="grid g2">
    <div class="card">
      <div class="card-h"><div class="card-t"><i class="ti ti-chart-donut"></i>Mastery by subject</div></div>
      ${Object.entries(SUBJ).map(([k,v])=>{const m=subjMastery(k);const c=ragCounts(k);const tot=c.reduce((a,b)=>a+b,0);return`<div style="margin-bottom:13px;cursor:pointer" onclick="go('${k}')"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px"><span style="font-weight:600"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${v.c};margin-right:7px"></span>${v.n}</span><span style="color:var(--muted)">${m}% · ${c[5]}/${tot} mastered</span></div><div class="bar"><div style="width:${m}%;background:${v.c}"></div></div></div>`;}).join('')}
    </div>
    <div>
      <div class="card" style="margin-bottom:14px">
        <div class="card-h"><div class="card-t"><i class="ti ti-alert-triangle"></i>Topics to revisit</div></div>
        ${weak.length?weak.slice(0,6).map(w=>`<div class="weak" style="cursor:pointer" onclick="go('${w.k}')"><span class="rag" style="background:${RAGC[w.rag]}">${w.rag}</span><div style="flex:1"><div style="font-weight:600">${w.n}</div><div style="font-size:11px;color:var(--muted)">${SUBJ[w.k].n} · ${w.u}</div></div></div>`).join('')+(weak.length>6?`<div style="font-size:11.5px;color:var(--muted);text-align:center;padding-top:10px">+${weak.length-6} more</div>`:''):'<div class="empty"><i class="ti ti-mood-smile"></i>Nothing flagged red or amber. Great work!</div>'}
      </div>
      <div class="card">
        <div class="card-h"><div class="card-t"><i class="ti ti-flag-3"></i>Active goals</div></div>
        ${active.length?active.slice(0,5).map(g=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12.5px"><span class="pill" style="background:${SUBJ[g.k].c};font-size:9px">${SUBJ[g.k].n}</span><span>${g.text}</span></div>`).join(''):'<div class="empty" style="padding:14px 0"><i class="ti ti-flag"></i>Set goals in each subject tab.</div>'}
      </div>
    </div>
  </div>`;
}

/* ---------- TIMETABLE ---------- */
let curWeek=0;
function renderTT(){
  document.getElementById('page-timetable').innerHTML=`
  <div class="tt-tabs">${WK_LABELS.map((l,i)=>`<button class="tt-tab ${i===curWeek?'active':''}" onclick="curWeek=${i};renderTT()">${l}</button>`).join('')}</div>
  <div id="tt-days"></div>`;
  const w=WEEKS[curWeek];
  document.getElementById('tt-days').innerHTML=w.days.map(d=>{
    const isE=!!d.exams;
    const ss=d.sessions.filter(x=>x.s!=='break'&&!x.exam);
    const done=ss.filter(x=>state.completed[sk(d.date,x.t,x.s)]).length;
    const pct=ss.length?Math.round(done/ss.length*100):0;
    const ep=d.exams?d.exams.map(e=>`<span class="exam-pill" style="background:${SUBJ[e].c}">${SUBJ[e].n} exam</span>`).join(''):'';
    return`<div class="day"><div class="day-h" style="${isE?'background:#FFF1F2':''}"><div><span class="day-d" style="${isE?'color:var(--pol)':''}">${d.date}</span>${d.note?`<span class="day-note">${d.note}</span>`:''}${ep}</div>${!isE?`<div style="display:flex;align-items:center;gap:10px"><span style="font-size:11px;color:var(--muted);font-weight:600">${done}/${ss.length}</span><div class="bar" style="width:64px"><div style="width:${pct}%;background:var(--green)"></div></div></div>`:''}</div>
    ${d.sessions.map(x=>{
      if(x.s==='break')return`<div style="display:flex;align-items:center;gap:10px;padding:9px 18px;border-bottom:1px solid var(--border);opacity:0.45"><i class="ti ti-coffee" style="font-size:15px"></i><span style="font-size:11.5px;color:var(--muted)">${x.t} — ${x.task}</span></div>`;
      if(x.exam){const sv=SUBJ[x.s];return`<div class="ses" style="background:${sv.c}10"><i class="ti ti-pencil" style="color:${sv.c};font-size:18px;width:21px;text-align:center"></i><span class="ses-time">${x.t}</span><span class="ses-task" style="font-weight:700;color:${sv.c}">${x.task}</span></div>`;}
      const k=sk(d.date,x.t,x.s),isDone=!!state.completed[k],hn=!!state.snotes[k],sv=SUBJ[x.s];
      return`<div class="ses${isDone?' done':''}"><button class="chk${isDone?' on':''}" style="${isDone?'background:'+sv.c:'border-color:'+sv.c+'55'}" onclick="toggleSes('${k}')">${isDone?'<i class="ti ti-check"></i>':''}</button><span class="pill" style="background:${sv.c};font-size:10px">${sv.n}</span><span class="ses-time">${x.t}</span><span class="ses-task">${x.task}</span><button class="icbtn${hn?' has':''}" onclick="sesNote('${k}')" title="Note"><i class="ti ti-notes"></i></button></div>`;
    }).join('')}</div>`;
  }).join('');
}
function toggleSes(k){state.completed[k]=!state.completed[k];if(state.completed[k])bumpStreak();else save();renderTT();updateNav();}
function sesNote(k){openM('Session note',`<div class="rte-tb">${rteTb()}</div><div class="rte" contenteditable="true" id="rte-x" data-ph="What did you cover? What to revisit?">${state.snotes[k]||''}</div>`,()=>{state.snotes[k]=document.getElementById('rte-x').innerHTML;bumpStreak();renderTT();});}

/* ---------- SUBJECT ---------- */
let curTab={};
function renderSubject(k){
  const v=SUBJ[k],m=subjMastery(k),c=ragCounts(k),tot=c.reduce((a,b)=>a+b,0);
  const tab=curTab[k]||'checklist';
  document.getElementById('page-'+k).innerHTML=`
  <div class="subj-hero" style="background:linear-gradient(135deg,${v.hex},${shade(v.hex)})">
    <i class="ti ${v.icon} bgic"></i>
    <div><div class="nm">${v.n}</div><div class="bd">${v.board}</div><div class="ex"><i class="ti ti-calendar-event"></i> ${v.exams.join('  ·  ')}</div></div>
    <div class="ring"><div class="rn">${m}%</div><div class="rl">Mastery</div></div>
  </div>
  <div class="stabs">
    <button class="stab ${tab==='checklist'?'active':''}" onclick="setTab('${k}','checklist')"><i class="ti ti-list-check"></i>Checklist</button>
    <button class="stab ${tab==='notes'?'active':''}" onclick="setTab('${k}','notes')"><i class="ti ti-notebook"></i>Notes & files</button>
    <button class="stab ${tab==='papers'?'active':''}" onclick="setTab('${k}','papers')"><i class="ti ti-file-text"></i>Past papers</button>
    <button class="stab ${tab==='goals'?'active':''}" onclick="setTab('${k}','goals')"><i class="ti ti-flag"></i>Goals</button>
  </div>
  <div id="sub-body-${k}"></div>`;
  renderTab(k,tab);
}
function setTab(k,t){curTab[k]=t;renderSubject(k);}
function shade(hex){const n=parseInt(hex.slice(1),16);let r=(n>>16)-30,g=((n>>8)&255)-30,b=(n&255)-30;r=Math.max(0,r);g=Math.max(0,g);b=Math.max(0,b);return'#'+(r<<16|g<<8|b).toString(16).padStart(6,'0');}

function renderTab(k,tab){
  if(tab==='checklist')renderChecklist(k);
  else if(tab==='notes')renderNotes(k);
  else if(tab==='papers')renderPapers(k);
  else renderGoals(k);
}

/* CHECKLIST */
let openUnits={};
function renderChecklist(k){
  const units=state.checklist[k]||[];
  const body=document.getElementById('sub-body-'+k);
  body.innerHTML=`
  <div class="card" style="border-left:3px solid ${SUBJ[k].c};border-radius:12px;margin-bottom:16px;padding:14px 16px;background:#FBFCFB">
    <div style="display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;margin-bottom:6px"><i class="ti ti-clipboard-list" style="color:${SUBJ[k].c};font-size:17px"></i>Summer Trials 2026</div>
    <div style="font-size:12.5px;color:var(--muted);line-height:1.6">${SUBJ[k].trials}</div>
  </div>
  <div class="legend">Tap a square to rate your confidence:
    ${RAG.map((r,i)=>`<span><span class="sw" style="background:${RAGC[i]}"></span>${i} ${r}</span>`).join('')}
  </div>
  ${units.map((u,ui)=>{
    const c=[0,0,0,0,0,0];u.topics.forEach(t=>c[t.rag]++);const tot=u.topics.length||1;
    const okey=k+'-'+ui;const open=openUnits[okey];
    return`<div class="unit ${open?'open':''}">
      <div class="unit-h" onclick="toggleUnit('${okey}')">
        <i class="ti ti-chevron-right unit-chev"></i>
        <div class="unit-nm">${u.u}</div>
        <div class="unit-prog">
          <div class="unit-ragbar">${[1,2,3,4,5].map(i=>c[i]?`<span style="width:${c[i]/tot*100}%;background:${RAGC[i]}"></span>`:'').join('')}${c[0]?`<span style="width:${c[0]/tot*100}%;background:var(--c0)"></span>`:''}</div>
          <span class="unit-count">${c[5]}/${u.topics.length}</span>
          <button class="icbtn" onclick="event.stopPropagation();editUnit('${k}',${ui})" title="Edit unit"><i class="ti ti-dots"></i></button>
        </div>
      </div>
      <div class="unit-body">
        ${u.topics.map((t,ti)=>`
          <div class="topic" id="tp-${t.id}">
            <div class="topic-row">
              <button class="rag" style="background:${RAGC[t.rag]}" onclick="cycleRag('${k}',${ui},${ti})" title="${RAG[t.rag]}">${t.rag}</button>
              <span class="topic-nm">${t.n}</span>
              <div class="topic-tools">
                ${t.note?'<span class="mini-tag" style="background:var(--green-l);color:var(--green-d)"><i class="ti ti-note"></i></span>':''}
                ${(t.files&&t.files.length)?`<span class="mini-tag" style="background:#FEE2E2;color:#B91C1C"><i class="ti ti-paperclip"></i>${t.files.length}</span>`:''}
                <button class="icbtn" onclick="toggleTopic('${t.id}')" title="Notes & files"><i class="ti ti-chevron-down"></i></button>
                <button class="icbtn" onclick="delTopic('${k}',${ui},${ti})" title="Delete"><i class="ti ti-x"></i></button>
              </div>
            </div>
            <div class="topic-detail">
              <div class="rte-tb">${rteTb()}</div>
              <div class="rte rte-sm" contenteditable="true" id="tn-${t.id}" data-ph="Annotations, key points, things to remember..." onblur="saveTopicNote('${k}',${ui},${ti},this)">${t.note||''}</div>
              <div style="margin-top:10px"><label class="file-drop" style="padding:10px" for="tf-${t.id}"><i class="ti ti-paperclip"></i> Attach PDF / file</label><input id="tf-${t.id}" type="file" style="display:none" onchange="attachTopic('${k}',${ui},${ti},this)"></div>
              <div id="tfl-${t.id}">${(t.files||[]).map(f=>`<div class="file-chip"><i class="ti ti-file-type-pdf fi"></i><span class="fn">${f.name}</span><button onclick="openFile('${f.id}')" title="Open"><i class="ti ti-external-link"></i></button><button onclick="delTopicFile('${k}',${ui},${ti},'${f.id}')" title="Remove"><i class="ti ti-trash"></i></button></div>`).join('')}</div>
            </div>
          </div>`).join('')}
        <div class="add-row"><input class="add-inp" id="at-${k}-${ui}" placeholder="Add a topic…" onkeydown="if(event.key==='Enter')addTopic('${k}',${ui})"><button class="btn sm pri" onclick="addTopic('${k}',${ui})"><i class="ti ti-plus"></i></button></div>
      </div>
    </div>`;
  }).join('')}
  <button class="btn" style="margin-top:6px" onclick="addUnit('${k}')"><i class="ti ti-plus"></i> Add unit</button>

}
function toggleUnit(key){openUnits[key]=!openUnits[key];const k=key.split('-')[0];renderChecklist(k);}
function toggleTopic(id){document.getElementById('tp-'+id).classList.toggle('exp');}
function cycleRag(k,ui,ti){const t=state.checklist[k][ui].topics[ti];t.rag=(t.rag+1)%6;bumpStreak();renderChecklist(k);updateNav();}
function saveTopicNote(k,ui,ti,el){state.checklist[k][ui].topics[ti].note=el.innerHTML;save();}
function addTopic(k,ui){const inp=document.getElementById(`at-${k}-${ui}`);const v=inp.value.trim();if(!v)return;state.checklist[k][ui].topics.push({id:uid(),n:v,rag:0,note:''});openUnits[k+'-'+ui]=true;bumpStreak();renderChecklist(k);setTimeout(()=>{const ni=document.getElementById(`at-${k}-${ui}`);if(ni)ni.focus();},50);}
function delTopic(k,ui,ti){if(!confirm('Delete this topic?'))return;state.checklist[k][ui].topics.splice(ti,1);save();renderChecklist(k);updateNav();}
function addUnit(k){openM('New unit','<label class="fl">Unit name</label><input id="un" placeholder="e.g. Theme 1 · Markets">',()=>{const v=document.getElementById('un').value.trim();if(!v)return;state.checklist[k].push({u:v,topics:[]});save();renderChecklist(k);});}
function editUnit(k,ui){const u=state.checklist[k][ui];openM('Edit unit',`<label class="fl">Unit name</label><input id="un" value="${u.u.replace(/"/g,'&quot;')}"><div style="margin-top:14px"><button class="btn danger sm" onclick="if(confirm('Delete whole unit?')){state.checklist['${k}'].splice(${ui},1);save();closeM();renderChecklist('${k}');updateNav();}"><i class="ti ti-trash"></i> Delete unit</button></div>`,()=>{const v=document.getElementById('un').value.trim();if(v)u.u=v;save();renderChecklist(k);});}
function bulkAdd(k){openM('Paste topic list','Pick a unit, paste one topic per line.','<label class="fl">Add to unit</label><select id="bu">'+state.checklist[k].map((u,i)=>`<option value="${i}">${u.u}</option>`).join('')+'</select><label class="fl">Topics (one per line)</label><textarea id="bt" style="min-height:140px" placeholder="Democracy & participation\nPolitical parties\nElectoral systems"></textarea>',()=>{const ui=+document.getElementById('bu').value;const lines=document.getElementById('bt').value.split('\n').map(s=>s.trim()).filter(Boolean);lines.forEach(l=>state.checklist[k][ui].topics.push({id:uid(),n:l,rag:0,note:''}));openUnits[k+'-'+ui]=true;bumpStreak();renderChecklist(k);updateNav();});}
async function attachTopic(k,ui,ti,inp){const file=inp.files[0];if(!file)return;const id=uid();await idbReady;await idbPut({id,blob:file});const t=state.checklist[k][ui].topics[ti];t.files=t.files||[];t.files.push({id,name:file.name});save();renderChecklist(k);}
async function delTopicFile(k,ui,ti,fid){await idbDel(fid);const t=state.checklist[k][ui].topics[ti];t.files=t.files.filter(f=>f.id!==fid);save();renderChecklist(k);}

  <div class="card">
    <div class="card-h"><div class="card-t"><i class="ti ti-file-text"></i>Attempts</div><button class="btn sm pri" onclick="addPaper('${k}')"><i class="ti ti-plus"></i> Log attempt</button></div>
    ${ps.length?ps.map((p,i)=>`<div class="pp"><div style="display:flex;align-items:center;justify-content:space-between"><div class="pp-nm">${p.paper}</div><div style="display:flex;align-items:center;gap:8px">${p.score!=null?`<span class="score" style="background:${RAGBG[scoreRag(p.score)]};color:${RAGTX[scoreRag(p.score)]}">${p.score}%</span>`:''}<button class="icbtn" onclick="editPaper('${k}',${i})"><i class="ti ti-edit"></i></button><button class="icbtn" onclick="delPaper('${k}',${i})"><i class="ti ti-trash"></i></button></div></div><div class="pp-meta">${[p.date,p.conditions].filter(Boolean).join(' · ')}</div>${p.notes?`<div class="pp-note">${p.notes}</div>`:''}</div>`).join(''):'<div class="empty"><i class="ti ti-file-off"></i>No attempts logged yet.</div>'}
  </div>`;
}
function scoreRag(s){return s>=90?5:s>=80?4:s>=65?3:s>=50?2:1;}
function trendSvg(scored,hex){
  const W=620,H=150,pad=24;const pts=scored.map((p,i)=>({x:pad+i*(W-2*pad)/Math.max(1,scored.length-1),y:H-pad-(p.score/100)*(H-2*pad),s:p.score}));
  const line=pts.map((p,i)=>(i?'L':'M')+p.x+' '+p.y).join(' ');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${[0,50,100].map(v=>{const y=H-pad-(v/100)*(H-2*pad);return`<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="#E4EAE7"/><text x="4" y="${y+3}" font-size="9" fill="#8A9B93">${v}</text>`;}).join('')}<path d="${line}" fill="none" stroke="${hex}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${hex}"/><text x="${p.x}" y="${p.y-9}" font-size="10" font-weight="700" fill="${hex}" text-anchor="middle">${p.s}</text>`).join('')}</svg>`;
}
function paperForm(p){return`<label class="fl">Paper / year</label><input id="p-p" value="${p?p.paper.replace(/"/g,'&quot;'):''}" placeholder="e.g. 2023 Paper 1"><label class="fl">Date</label><input id="p-d" type="date" value="${p?p.date||'':''}"><label class="fl">Score (%)</label><input id="p-s" type="number" min="0" max="100" value="${p&&p.score!=null?p.score:''}"><label class="fl">Conditions</label><input id="p-c" value="${p?(p.conditions||'').replace(/"/g,'&quot;'):''}" placeholder="Timed, closed book…"><label class="fl">Notes / areas to improve</label><textarea id="p-n">${p?p.notes||'':''}</textarea>`;}
function paperVal(){return{paper:document.getElementById('p-p').value.trim(),date:document.getElementById('p-d').value,score:document.getElementById('p-s').value!==''?+document.getElementById('p-s').value:null,conditions:document.getElementById('p-c').value.trim(),notes:document.getElementById('p-n').value.trim()};}
function addPaper(k){openM('Log past paper',paperForm(null),()=>{const v=paperVal();if(!v.paper)return;state.papers[k].push(v);bumpStreak();renderPapers(k);});}
function editPaper(k,i){openM('Edit attempt',paperForm(state.papers[k][i]),()=>{state.papers[k][i]=paperVal();save();renderPapers(k);});}
function delPaper(k,i){if(!confirm('Delete?'))return;state.papers[k].splice(i,1);save();renderPapers(k);}

/* GOALS */
function renderGoals(k){
  const gs=state.goals[k];
  document.getElementById('sub-body-'+k).innerHTML=`
  <div class="card"><div class="card-h"><div class="card-t"><i class="ti ti-flag"></i>Goals for ${SUBJ[k].n}</div><button class="btn sm pri" onclick="addGoal('${k}')"><i class="ti ti-plus"></i> Add goal</button></div>
  ${gs.length?gs.map((g,i)=>{const over=g.due&&!g.done&&g.due<todayStr();return`<div class="goal"><button class="chk${g.done?' on':''}" style="${g.done?'background:'+SUBJ[k].c:'border-color:'+SUBJ[k].c}" onclick="togGoal('${k}',${i})">${g.done?'<i class="ti ti-check"></i>':''}</button><div style="flex:1"><div class="goal-txt${g.done?' done':''}">${g.text}</div>${g.due?`<div class="goal-due ${over?'over':''}"><i class="ti ti-calendar"></i> ${over?'Overdue · ':''}${fmtDate(g.due)}</div>`:''}</div><button class="icbtn" onclick="delGoal('${k}',${i})"><i class="ti ti-trash"></i></button></div>`;}).join(''):'<div class="empty"><i class="ti ti-flag-2"></i>No goals yet. Set targets to stay on track.</div>'}
  </div>`;
}
function fmtDate(d){return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function addGoal(k){openM('New goal — '+SUBJ[k].n,'<label class="fl">Goal</label><textarea id="g-t" placeholder="e.g. Score 80%+ on a timed essay"></textarea><label class="fl">Target date (optional)</label><input id="g-d" type="date">',()=>{const t=document.getElementById('g-t').value.trim();if(!t)return;state.goals[k].push({text:t,done:false,due:document.getElementById('g-d').value||null});save();renderGoals(k);renderDashIfActive();});}
function togGoal(k,i){state.goals[k][i].done=!state.goals[k][i].done;if(state.goals[k][i].done)bumpStreak();else save();renderGoals(k);}
function delGoal(k,i){state.goals[k].splice(i,1);save();renderGoals(k);}
function renderDashIfActive(){if(document.getElementById('page-dashboard').classList.contains('active'))renderDash();}

/* RICH TEXT */
function rteTb(){return['bold|ti-bold','italic|ti-italic','formatBlock|h3|ti-heading','insertUnorderedList|ti-list','insertOrderedList|ti-list-numbers'].map(x=>{const[cmd,a,b]=x.split('|');const ic=b||a;const arg=b?a:'';return`<button class="rte-b" onmousedown="event.preventDefault();rteCmd('${cmd}','${arg}')"><i class="ti ${ic}"></i></button>`;}).join('');}
function rteCmd(cmd,arg){document.execCommand(cmd,false,arg||null);}

/* MODAL */
let mcb=null;
function openM(title,subOrBody,bodyOrCb,cb){
  let sub='',body='',callback;
  if(typeof bodyOrCb==='function'){body=subOrBody;callback=bodyOrCb;}
  else{sub=subOrBody;body=bodyOrCb;callback=cb;}
  document.getElementById('m-title').textContent=title;
  const ms=document.getElementById('m-sub');if(sub){ms.textContent=sub;ms.style.display='block';}else ms.style.display='none';
  document.getElementById('m-body').innerHTML=body;
  document.getElementById('ov').classList.add('open');mcb=callback;
  setTimeout(()=>{const f=document.querySelector('#m-body input,#m-body textarea,#m-body [contenteditable]');if(f)f.focus();},40);
}
function closeM(){document.getElementById('ov').classList.remove('open');mcb=null;}
function saveM(){if(mcb)mcb();closeM();}

/* EXPORT */
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='revision-hub-backup-'+todayStr()+'.json';a.click();}

/* INIT */
idbReady.then(()=>{});
go('dashboard');
updateNav();
initSync();
</script>
</body>
</html>
